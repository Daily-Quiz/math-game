<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tala – Math Quiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body{
      font-family:"Segoe UI",Arial,sans-serif;
      background:#f3f6fb;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      margin:0;
      padding:16px;
    }
    .card{
      background:#fff;
      padding:28px;
      max-width:760px;
      width:100%;
      border-radius:12px;
      box-shadow:0 6px 18px rgba(0,0,0,.15);
      text-align:center;
    }
    h1{color:#002f6c;margin:0 0 10px;}
    .stats{
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
      color:#444;
      margin:10px 0 18px;
      font-weight:600;
    }
    .pill{
      background:#f0f4ff;
      border:1px solid #d7e2ff;
      border-radius:999px;
      padding:8px 12px;
      font-size:0.95em;
    }
    .question{
      font-size:1.8em;
      line-height:1.4;
      margin:10px 0 16px;
      font-weight:700;
      color:#111;
    }
    .row{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
      margin:10px 0;
    }
    input{
      font-size:1.1em;
      padding:12px 14px;
      border-radius:8px;
      border:1px solid #cdd7f1;
      min-width:220px;
      outline:none;
    }
    button{
      background:#002f6c;
      color:#fff;
      border:none;
      padding:12px 18px;
      font-size:1em;
      border-radius:8px;
      cursor:pointer;
      font-weight:650;
    }
    button:hover{background:#004a9f;}
    button.secondary{
      background:#e9eefc;
      color:#002f6c;
      border:1px solid #cdd7f1;
    }
    button.secondary:hover{background:#dfe7ff;}
    .feedback{
      margin-top:12px;
      min-height:26px;
      font-size:1.05em;
      font-weight:650;
    }
    .good{color:#0f766e;}
    .bad{color:#be123c;}
    .footer{
      margin-top:18px;
      font-size:.95em;
      color:#666;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>🧠 Tala’s Math Quiz</h1>

    <div class="stats">
      <div class="pill">✅ Correct: <span id="correctCount">0</span> / 5</div>
      <div class="pill">⭐ Streak: <span id="streakCount">0</span></div>
    </div>

    <div class="question" id="question">Loading…</div>

    <div class="row">
      <input id="answer" inputmode="numeric" pattern="[0-9]*" placeholder="Type the answer" />
      <button id="submitBtn">Submit</button>
    </div>

    <div class="feedback" id="feedback"></div>

    <div class="row">
      <button class="secondary" id="nextBtn">Next question</button>
      <button class="secondary" id="resetBtn">Reset</button>
    </div>

    <div class="footer">
      Tip: Scan the QR again (or come back to this tab) for a new question.
    </div>
  </div>

  <script>
    // ===== Settings =====
    const PHONE = "004530688081";
    const SMS_TEXT = "Tala answered 5 questions right";
    const STORAGE_KEY = "tala_math_quiz_v1";

    // ===== Elements =====
    const questionEl = document.getElementById("question");
    const answerEl = document.getElementById("answer");
    const submitBtn = document.getElementById("submitBtn");
    const nextBtn = document.getElementById("nextBtn");
    const resetBtn = document.getElementById("resetBtn");
    const feedbackEl = document.getElementById("feedback");
    const correctCountEl = document.getElementById("correctCount");
    const streakCountEl = document.getElementById("streakCount");

    let state = loadState();
    let current = null;

    function loadState(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return { correct:0, streak:0, smsOpened:false };
        return JSON.parse(raw);
      }catch(e){
        return { correct:0, streak:0, smsOpened:false };
      }
    }
    function saveState(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }
    function renderStats(){
      correctCountEl.textContent = state.correct;
      streakCountEl.textContent = state.streak;
    }

    // ===== Question generation (age 8-friendly) =====
    function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }

    // Slightly increases difficulty as correct count grows
    function generateQuestion(){
      const level = Math.min(2, Math.floor(state.correct / 2)); // 0..2
      const roll = Math.random();

      // Level 0: + / - within 20
      if(level === 0){
        if(roll < 0.6){
          const a = randInt(2, 20), b = randInt(1, 20);
          return { text: `${a} + ${b} = ?`, answer: a + b };
        } else {
          const a = randInt(3, 20), b = randInt(1, a);
          return { text: `${a} − ${b} = ?`, answer: a - b };
        }
      }

      // Level 1: add within 100 (not too big), and easy ×
      if(level === 1){
        if(roll < 0.55){
          const a = randInt(10, 60), b = randInt(5, 40);
          return { text: `${a} + ${b} = ?`, answer: a + b };
        } else {
          const base = [2,5,10][randInt(0,2)];
          const n = randInt(1, 12);
          return { text: `${base} × ${n} = ?`, answer: base * n };
        }
      }

      // Level 2: mix +/-, ×, and missing number
      if(roll < 0.4){
        const a = randInt(10, 99), b = randInt(5, 40);
        return { text: `${a} + ${b} = ?`, answer: a + b };
      } else if(roll < 0.75){
        const a = randInt(12, 40), b = randInt(1, 12);
        return { text: `${a} − ${b} = ?`, answer: a - b };
      } else if(roll < 0.9){
        const base = [2,3,4,5,10][randInt(0,4)];
        const n = randInt(2, 12);
        return { text: `${base} × ${n} = ?`, answer: base * n };
      } else {
        const b = randInt(1, 12);
        const a = randInt(1, 12);
        const c = a + b;
        return { text: `□ + ${b} = ${c}  (What is □?)`, answer: a };
      }
    }

    function newQuestion(){
      current = generateQuestion();
      questionEl.textContent = current.text;
      answerEl.value = "";
      feedbackEl.textContent = "";
      answerEl.focus();
    }

    // ===== Check answer =====
    function checkAnswer(){
      if(!current) return;

      const val = answerEl.value.trim();
      if(val === ""){
        feedbackEl.innerHTML = `<span class="bad">Type an answer first 🙂</span>`;
        return;
      }
      const userAns = Number(val);
      if(!Number.isFinite(userAns)){
        feedbackEl.innerHTML = `<span class="bad">Numbers only 🙂</span>`;
        return;
      }

      if(userAns === current.answer){
        state.correct += 1;
        state.streak += 1;
        saveState();
        renderStats();
        feedbackEl.innerHTML = `<span class="good">Correct! ✅</span>`;

        if(state.correct >= 5 && !state.smsOpened){
          openSms();
          return;
        }
        setTimeout(newQuestion, 450);
      }else{
        state.streak = 0;
        saveState();
        renderStats();
        feedbackEl.innerHTML = `<span class="bad">Not quite — it was ${current.answer} ❌</span>`;
      }
    }

    // ===== Open Messages with prefilled text =====
    function openSms(){
      state.smsOpened = true;
      saveState();
      renderStats();

      // Official Apple doc describes sms:<phone> format (no body). [2](https://developer.apple.com/library/archive/featuredarticles/iPhoneURLScheme_Reference/SMSLinks/SMSLinks.html)
      // In practice iOS Safari supports a body parameter, often using &body= . [3](https://stackoverflow.com/questions/16165393/ios-sms-scheme-in-html-hyperlink-with-body)
      const body = encodeURIComponent(SMS_TEXT);
      const smsLink = `sms:${PHONE}&body=${body}`;

      feedbackEl.innerHTML = `<span class="good">Amazing! 5 correct 🎉 Opening Messages…</span>`;
      setTimeout(() => { window.location.href = smsLink; }, 700);
    }

    function resetAll(){
      state = { correct:0, streak:0, smsOpened:false };
      saveState();
      renderStats();
      newQuestion();
    }

    // Buttons + Enter key
    submitBtn.addEventListener("click", checkAnswer);
    nextBtn.addEventListener("click", newQuestion);
    resetBtn.addEventListener("click", resetAll);
    answerEl.addEventListener("keydown", (e) => { if(e.key === "Enter") checkAnswer(); });

    // “New question every scan” helper:
    // When iPad opens/returns to Safari, the page becomes visible again.
    document.addEventListener("visibilitychange", () => {
      if(document.visibilityState === "visible") newQuestion();
    });

    // Start
    renderStats();
    newQuestion();
  </script>
</body>
</html>
