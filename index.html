<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tala’s Math Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f3f6fb;
      margin: 0;
      padding: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #fff;
      padding: 28px;
      max-width: 720px;
      width: 100%;
      border-radius: 14px;
      box-shadow: 0 8px 22px rgba(0,0,0,.15);
      text-align: center;
      position: relative;
      z-index: 1;
    }

    h1 {
      color: #002f6c;
      margin-top: 0;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 18px;
      font-weight: 600;
      color: #444;
    }

    .pill {
      background: #f0f4ff;
      border-radius: 999px;
      padding: 8px 14px;
      border: 1px solid #d7e2ff;
    }

    .question {
      font-size: 2rem;
      font-weight: 800;
      margin: 16px 0;
    }

    .row {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    input {
      font-size: 1.2rem;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #cdd7f1;
      width: 220px;
      text-align: center;
    }

    button {
      background: #002f6c;
      color: #fff;
      border: none;
      padding: 12px 18px;
      font-size: 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
    }

    button.secondary {
      background: #e9eefc;
      color: #002f6c;
      border: 1px solid #cdd7f1;
    }

    .feedback {
      margin-top: 14px;
      min-height: 26px;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .good { color: #0f766e; }
    .bad { color: #be123c; }

    /* ===== Celebration overlay ===== */
    .celebration {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .celebration-box {
      background: white;
      padding: 32px 26px;
      border-radius: 18px;
      text-align: center;
      box-shadow: 0 16px 40px rgba(0,0,0,.3);
      max-width: 520px;
      width: 90%;
    }

    .celebration-box h2 {
      font-size: 2.2rem;
      margin: 12px 0 6px;
      color: #002f6c;
    }

    .celebration-box p {
      font-size: 1.4rem;
      font-weight: 700;
      margin: 0;
    }

    /* ===== Confetti ===== */
    .confetti {
      position: fixed;
      top: -10px;
      width: 10px;
      height: 10px;
      opacity: 0.9;
      animation: fall linear forwards;
      z-index: 10000;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(720deg);
      }
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>🧠 Tala’s Math Game</h1>

    <div class="stats">
      <div class="pill">✅ Correct: <span id="correctCount">0</span> / 5</div>
      <div class="pill">⭐ Streak: <span id="streakCount">0</span></div>
    </div>

    <div class="question" id="question">Loading…</div>

    <div class="row">
      <input id="answer" inputmode="numeric" placeholder="Your answer" />
      <button id="submitBtn">Submit</button>
    </div>

    <div class="feedback" id="feedback"></div>

    <div class="row" style="margin-top:14px;">
      <button class="secondary" id="nextBtn">Next question</button>
      <button class="secondary" id="resetBtn">Reset</button>
    </div>
  </div>

  <!-- Celebration overlay -->
  <div class="celebration" id="celebration">
    <div class="celebration-box">
      <div style="font-size:64px;">🎉🥳✨</div>
      <h2>Well done Tala!</h2>
      <p>You are so smart ⭐</p>
      <p style="margin-top:10px;font-size:0.9rem;color:#555;">
        Sending your result…
      </p>
    </div>
  </div>

<script>
  const PHONE = "004530688081";
  const SMS_TEXT = "Tala answered 5 questions right";

  const correctEl = document.getElementById("correctCount");
  const streakEl = document.getElementById("streakCount");
  const questionEl = document.getElementById("question");
  const answerEl = document.getElementById("answer");
  const feedbackEl = document.getElementById("feedback");
  const celebrationEl = document.getElementById("celebration");

  let correct = 0;
  let streak = 0;
  let currentAnswer = 0;

  function rand(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function newQuestion() {
    const type = Math.random();
    let a, b;

    if (type < 0.6) {
      a = rand(1, 20);
      b = rand(1, 20);
      currentAnswer = a + b;
      questionEl.textContent = `${a} + ${b} = ?`;
    } else {
      a = rand(2, 10);
      b = rand(1, 10);
      currentAnswer = a * b;
      questionEl.textContent = `${a} × ${b} = ?`;
    }

    answerEl.value = "";
    feedbackEl.textContent = "";
    answerEl.focus();
  }

  function checkAnswer() {
    const val = Number(answerEl.value);

    if (val === currentAnswer) {
      correct++;
      streak++;
      feedbackEl.innerHTML = "<span class='good'>Correct ✅</span>";
      updateStats();

      if (correct === 5) {
        celebrate();
        return;
      }

      setTimeout(newQuestion, 500);
    } else {
      streak = 0;
      feedbackEl.innerHTML = "<span class='bad'>Try again ❌</span>";
      updateStats();
    }
  }

  function updateStats() {
    correctEl.textContent = correct;
    streakEl.textContent = streak;
  }

  function celebrate() {
    celebrationEl.style.display = "flex";
    startConfetti();

    setTimeout(() => {
      const body = encodeURIComponent(SMS_TEXT);
      window.location.href = `sms:${PHONE}&body=${body}`;
    }, 1800);
  }

  function startConfetti() {
    for (let i = 0; i < 120; i++) {
      const confetti = document.createElement("div");
      confetti.className = "confetti";
      confetti.style.left = Math.random() * 100 + "vw";
      confetti.style.backgroundColor =
        ["#ff0a54","#ff477e","#ffd166","#06d6a0","#118ab2"][rand(0,4)];
      confetti.style.animationDuration = rand(3, 6) + "s";
      document.body.appendChild(confetti);

      setTimeout(() => confetti.remove(), 6000);
    }
  }

  document.getElementById("submitBtn").onclick = checkAnswer;
  document.getElementById("nextBtn").onclick = newQuestion;
  document.getElementById("resetBtn").onclick = () => location.reload();
  answerEl.addEventListener("keydown", e => e.key === "Enter" && checkAnswer());

  newQuestion();
</script>

</body>
</html>
``
